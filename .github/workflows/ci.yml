name: CI

# Trigger on every push to main and every PR targeting main.
# Branches list is explicit so we don't burn CI on forks we don't own.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs of the same branch on a new push —
# keeps the queue moving for tight feedback loops.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: typecheck + lint + test + build
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Test
        working-directory: frontend
        run: npm test

      - name: Build
        working-directory: frontend
        run: npm run build